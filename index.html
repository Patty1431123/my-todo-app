<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#050709">
<title>TASK OS — Professional Task Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#050709; --bg2:#090c10; --surface:#0d1117; --surface2:#131920; --surface3:#1a2230;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#f0f4ff; --text2:#8b95a8; --text3:#4a5568;
  --blue:#3b82f6; --blue-glow:rgba(59,130,246,0.15); --blue-soft:rgba(59,130,246,0.08);
  --red:#ef4444; --red-soft:rgba(239,68,68,0.08);
  --amber:#f59e0b; --amber-soft:rgba(245,158,11,0.08);
  --emerald:#10b981; --emerald-soft:rgba(16,185,129,0.08);
  --purple:#8b5cf6; --radius:12px; --radius-sm:8px;
}
html { height:100%; scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Outfit',sans-serif; min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased; }
.ambient { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.ambient-blob { position:absolute; border-radius:50%; filter:blur(80px); opacity:0.12; }
.blob1 { width:500px; height:500px; background:var(--blue); top:-200px; left:-150px; animation:blobFloat 12s ease-in-out infinite; }
.blob2 { width:400px; height:400px; background:var(--purple); bottom:-150px; right:-100px; animation:blobFloat 15s ease-in-out infinite reverse; }
.blob3 { width:250px; height:250px; background:var(--emerald); top:40%; left:50%; animation:blobFloat 10s ease-in-out infinite 3s; }
@keyframes blobFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(30px,-30px) scale(1.05);} 66%{transform:translate(-20px,20px) scale(0.95);} }
.grid-lines { position:fixed; inset:0; pointer-events:none; z-index:0; background-image:linear-gradient(rgba(59,130,246,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.025) 1px,transparent 1px); background-size:48px 48px; }
.app { position:relative; z-index:1; max-width:720px; margin:0 auto; padding:0 0 6rem; min-height:100vh; }
.topbar { position:sticky; top:0; z-index:50; background:rgba(5,7,9,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-bottom:1px solid var(--border); padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; animation:slideDown 0.5s ease forwards; }
@keyframes slideDown { from{opacity:0;transform:translateY(-20px);} to{opacity:1;transform:translateY(0);} }
.brand { display:flex; align-items:center; gap:0.75rem; }
.brand-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--blue),var(--purple)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:1rem; box-shadow:0 0 20px rgba(59,130,246,0.3); }
.brand-name { font-size:1rem; font-weight:700; letter-spacing:-0.02em; color:var(--text); }
.brand-name span { color:var(--blue); }
.brand-sub { font-size:0.6rem; font-family:'JetBrains Mono',monospace; color:var(--text3); letter-spacing:0.1em; text-transform:uppercase; margin-top:1px; }
.topbar-right { display:flex; align-items:center; gap:0.75rem; }
.date-chip { font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.08em; color:var(--text2); background:var(--surface); border:1px solid var(--border); padding:0.4rem 0.8rem; border-radius:100px; }
.time-chip { font-family:'JetBrains Mono',monospace; font-size:0.65rem; letter-spacing:0.05em; color:var(--blue); background:var(--blue-soft); border:1px solid rgba(59,130,246,0.2); padding:0.4rem 0.8rem; border-radius:100px; min-width:65px; text-align:center; }
.main { padding:2rem 1.5rem 0; }
.greeting { margin-bottom:2rem; animation:fadeUp 0.6s 0.1s ease both; }
.greeting-line { font-size:1.6rem; font-weight:700; letter-spacing:-0.03em; color:var(--text); line-height:1.2; }
.greeting-line span { color:var(--blue); }
.greeting-sub { font-size:0.8rem; color:var(--text3); margin-top:0.4rem; font-weight:400; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.75rem; margin-bottom:1.5rem; animation:fadeUp 0.6s 0.15s ease both; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.1rem 1rem; position:relative; overflow:hidden; transition:border-color 0.2s,transform 0.2s; }
.stat-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.stat-card::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.02) 0%,transparent 60%); pointer-events:none; }
.stat-icon { font-size:1.1rem; margin-bottom:0.6rem; display:block; }
.stat-val { font-size:1.8rem; font-weight:800; letter-spacing:-0.04em; line-height:1; margin-bottom:0.3rem; }
.stat-card:nth-child(1) .stat-val { color:var(--blue); }
.stat-card:nth-child(2) .stat-val { color:var(--emerald); }
.stat-card:nth-child(3) .stat-val { color:var(--amber); }
.stat-lbl { font-size:0.65rem; font-weight:500; color:var(--text3); text-transform:uppercase; letter-spacing:0.08em; }
.progress-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.2rem 1.3rem; margin-bottom:1.5rem; animation:fadeUp 0.6s 0.2s ease both; }
.progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem; }
.progress-title { font-size:0.75rem; font-weight:600; color:var(--text2); letter-spacing:0.02em; }
.progress-pct { font-family:'JetBrains Mono',monospace; font-size:0.75rem; font-weight:500; color:var(--blue); background:var(--blue-soft); padding:0.2rem 0.6rem; border-radius:100px; border:1px solid rgba(59,130,246,0.2); }
.progress-track { height:6px; background:var(--surface3); border-radius:100px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--blue),var(--emerald)); border-radius:100px; transition:width 0.7s cubic-bezier(0.4,0,0.2,1); position:relative; }
.progress-bar::after { content:''; position:absolute; right:0; top:50%; transform:translateY(-50%); width:10px; height:10px; background:white; border-radius:50%; box-shadow:0 0 8px rgba(255,255,255,0.6),0 0 20px var(--blue); }
.progress-labels { display:flex; justify-content:space-between; margin-top:0.6rem; }
.progress-labels span { font-family:'JetBrains Mono',monospace; font-size:0.55rem; color:var(--text3); letter-spacing:0.05em; }
.filter-wrap { display:flex; gap:0.4rem; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; animation:fadeUp 0.6s 0.25s ease both; }
.filter-wrap::-webkit-scrollbar { display:none; }
.filter-btn { padding:0.5rem 1rem; font-family:'Outfit',sans-serif; font-size:0.72rem; font-weight:500; background:var(--surface); border:1px solid var(--border); color:var(--text2); border-radius:100px; cursor:pointer; transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
.filter-btn:hover { border-color:var(--border2); color:var(--text); }
.filter-btn.active { background:var(--blue); border-color:var(--blue); color:white; box-shadow:0 4px 15px rgba(59,130,246,0.3); }
.add-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.2rem; margin-bottom:1.5rem; animation:fadeUp 0.6s 0.3s ease both; transition:border-color 0.2s; }
.add-card:focus-within { border-color:rgba(59,130,246,0.4); box-shadow:0 0 0 3px rgba(59,130,246,0.06); }
.add-row { display:flex; align-items:center; gap:0.8rem; margin-bottom:0.8rem; }
.add-icon { width:28px; height:28px; background:var(--blue-soft); border:1px solid rgba(59,130,246,0.25); border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--blue); font-size:1.1rem; flex-shrink:0; }
.task-input { flex:1; background:transparent; border:none; outline:none; font-family:'Outfit',sans-serif; font-size:0.88rem; font-weight:400; color:var(--text); caret-color:var(--blue); }
.task-input::placeholder { color:var(--text3); }
.add-footer { display:flex; justify-content:space-between; align-items:center; padding-top:0.8rem; border-top:1px solid var(--border); }
.priority-group { display:flex; gap:0.4rem; align-items:center; }
.priority-label { font-size:0.65rem; font-weight:500; color:var(--text3); letter-spacing:0.05em; margin-right:0.2rem; }
.prio-btn { padding:0.3rem 0.7rem; font-size:0.65rem; font-weight:600; border-radius:100px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text2); transition:all 0.15s; font-family:'Outfit',sans-serif; }
.prio-btn.active-high { background:var(--red-soft); border-color:rgba(239,68,68,0.4); color:var(--red); }
.prio-btn.active-medium { background:var(--amber-soft); border-color:rgba(245,158,11,0.4); color:var(--amber); }
.prio-btn.active-low { background:var(--emerald-soft); border-color:rgba(16,185,129,0.4); color:var(--emerald); }
.add-submit { display:flex; align-items:center; gap:0.5rem; padding:0.55rem 1.2rem; background:var(--blue); border:none; border-radius:var(--radius-sm); font-family:'Outfit',sans-serif; font-size:0.75rem; font-weight:600; color:white; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 12px rgba(59,130,246,0.3); }
.add-submit:hover { background:#2563eb; transform:translateY(-1px); box-shadow:0 6px 20px rgba(59,130,246,0.4); }
.add-submit:active { transform:scale(0.97); }
.section-hdr { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; animation:fadeUp 0.6s 0.35s ease both; }
.section-title { font-size:0.7rem; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; }
.clear-done { font-size:0.65rem; font-weight:500; color:var(--text3); background:none; border:none; cursor:pointer; font-family:'Outfit',sans-serif; padding:0.3rem 0.6rem; border-radius:var(--radius-sm); transition:all 0.2s; }
.clear-done:hover { color:var(--red); background:var(--red-soft); }
#task-list { list-style:none; display:flex; flex-direction:column; gap:0.5rem; }
.task-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.1rem; display:flex; align-items:flex-start; gap:0.85rem; transition:all 0.25s cubic-bezier(0.4,0,0.2,1); animation:taskIn 0.35s ease forwards; position:relative; overflow:hidden; }
.task-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:3px 0 0 3px; }
.task-item.p-high::before { background:var(--red); }
.task-item.p-medium::before { background:var(--amber); }
.task-item.p-low::before { background:var(--emerald); }
.task-item:hover { border-color:var(--border2); transform:translateY(-1px); box-shadow:0 8px 25px rgba(0,0,0,0.3); }
.task-item.completed { opacity:0.45; }
.task-item.completed .task-name { text-decoration:line-through; color:var(--text3); }
@keyframes taskIn { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }
.checkbox { width:22px; height:22px; border-radius:7px; border:1.5px solid var(--border2); background:var(--surface2); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; transition:all 0.2s; }
.checkbox:hover { border-color:var(--blue); background:var(--blue-soft); }
.checkbox.checked { background:var(--blue); border-color:var(--blue); box-shadow:0 0 12px rgba(59,130,246,0.4); }
.checkbox.checked::after { content:''; width:11px; height:7px; border-left:2px solid white; border-bottom:2px solid white; transform:rotate(-45deg) translateY(-1px); }
.task-body { flex:1; min-width:0; }
.task-name { font-size:0.87rem; font-weight:500; color:var(--text); line-height:1.4; margin-bottom:0.4rem; word-break:break-word; }
.task-meta { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
.task-tag { font-size:0.6rem; font-weight:600; padding:0.18rem 0.55rem; border-radius:100px; letter-spacing:0.05em; text-transform:uppercase; }
.tag-high { background:var(--red-soft); color:var(--red); border:1px solid rgba(239,68,68,0.25); }
.tag-medium { background:var(--amber-soft); color:var(--amber); border:1px solid rgba(245,158,11,0.25); }
.tag-low { background:var(--emerald-soft); color:var(--emerald); border:1px solid rgba(16,185,129,0.25); }
.task-time { font-family:'JetBrains Mono',monospace; font-size:0.58rem; color:var(--text3); letter-spacing:0.03em; }
.task-del { width:30px; height:30px; background:transparent; border:1px solid transparent; border-radius:var(--radius-sm); color:var(--text3); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.85rem; flex-shrink:0; transition:all 0.2s; opacity:0; }
.task-item:hover .task-del { opacity:1; }
.task-del:hover { color:var(--red); background:var(--red-soft); border-color:rgba(239,68,68,0.2); }
.empty { display:none; flex-direction:column; align-items:center; justify-content:center; padding:4rem 2rem; text-align:center; }
.empty.show { display:flex; }
.empty-ring { width:80px; height:80px; border-radius:50%; border:2px dashed var(--surface3); display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin-bottom:1.2rem; color:var(--text3); }
.empty h3 { font-size:0.9rem; font-weight:600; color:var(--text2); margin-bottom:0.4rem; }
.empty p { font-size:0.75rem; color:var(--text3); }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(5,7,9,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-top:1px solid var(--border); padding:0.8rem 2rem 1.2rem; display:flex; justify-content:space-around; z-index:50; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:0.3rem; cursor:pointer; padding:0.5rem 1rem; border-radius:var(--radius-sm); transition:all 0.2s; background:none; border:none; color:var(--text3); }
.nav-item.active { color:var(--blue); }
.nav-item:hover { color:var(--text2); }
.nav-icon { font-size:1.3rem; }
.nav-label { font-size:0.55rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }
.toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--surface2); border:1px solid var(--border2); padding:0.7rem 1.2rem; border-radius:100px; font-size:0.75rem; font-weight:500; color:var(--text); z-index:999; opacity:0; transition:all 0.3s; white-space:nowrap; pointer-events:none; box-shadow:0 8px 30px rgba(0,0,0,0.5); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="ambient">
  <div class="ambient-blob blob1"></div>
  <div class="ambient-blob blob2"></div>
  <div class="ambient-blob blob3"></div>
</div>
<div class="grid-lines"></div>
<div class="topbar">
  <div class="brand">
    <div class="brand-icon">✦</div>
    <div>
      <div class="brand-name">TASK<span>OS</span></div>
      <div class="brand-sub">Professional · v2.0</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="date-chip" id="dateBadge">—</div>
    <div class="time-chip" id="timeBadge">00:00</div>
  </div>
</div>
<div class="app">
  <div class="main">
    <div class="greeting">
      <div class="greeting-line" id="greetingLine">Good morning<span> 👋</span></div>
      <div class="greeting-sub" id="greetingSub">Here's your task overview for today.</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><span class="stat-icon">📋</span><div class="stat-val" id="totalCount">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat-card"><span class="stat-icon">✅</span><div class="stat-val" id="doneCount">0</div><div class="stat-lbl">Done</div></div>
      <div class="stat-card"><span class="stat-icon">⏳</span><div class="stat-val" id="pendingCount">0</div><div class="stat-lbl">Pending</div></div>
    </div>
    <div class="progress-card">
      <div class="progress-top">
        <span class="progress-title">Today's Progress</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
      <div class="progress-labels">
        <span>Start</span>
        <span id="progressMsg">No tasks yet</span>
        <span>Complete</span>
      </div>
    </div>
    <div class="filter-wrap">
      <button class="filter-btn active" data-f="all">All Tasks</button>
      <button class="filter-btn" data-f="active">Active</button>
      <button class="filter-btn" data-f="done">Completed</button>
      <button class="filter-btn" data-f="high">🔴 High</button>
      <button class="filter-btn" data-f="medium">🟡 Medium</button>
      <button class="filter-btn" data-f="low">🟢 Low</button>
    </div>
    <div class="add-card">
      <div class="add-row">
        <div class="add-icon">+</div>
        <input type="text" class="task-input" id="taskInput" placeholder="What needs to be done?" maxlength="120" autocomplete="off">
      </div>
      <div class="add-footer">
        <div class="priority-group">
          <span class="priority-label">Priority:</span>
          <button class="prio-btn active-high" data-p="high">High</button>
          <button class="prio-btn" data-p="medium">Medium</button>
          <button class="prio-btn" data-p="low">Low</button>
        </div>
        <button class="add-submit" id="addBtn"><span>Add Task</span><span>→</span></button>
      </div>
    </div>
    <div class="section-hdr">
      <span class="section-title">Tasks</span>
      <button class="clear-done" id="clearDoneBtn">Clear completed</button>
    </div>
    <ul id="task-list"></ul>
    <div class="empty" id="emptyState">
      <div class="empty-ring">◈</div>
      <h3>All clear!</h3>
      <p>No tasks here. Add one above to get started.</p>
    </div>
  </div>
</div>
<div class="bottom-nav">
  <button class="nav-item active"><span class="nav-icon">📋</span><span class="nav-label">Tasks</span></button>
  <button class="nav-item"><span class="nav-icon">📊</span><span class="nav-label">Stats</span></button>
  <button class="nav-item"><span class="nav-icon">🔔</span><span class="nav-label">Alerts</span></button>
  <button class="nav-item"><span class="nav-icon">⚙️</span><span class="nav-label">Settings</span></button>
</div>
<div class="toast" id="toast"></div>
<script>
  let tasks = JSON.parse(localStorage.getItem('taskok-v2') || '[]');
  let filter = 'all';
  let selectedPriority = 'high';
  if (tasks.length === 0) {
    tasks = [
      { id:1, text:'Review Q4 project proposal and send feedback to team', priority:'high', done:false, ts:Date.now()-3600000 },
      { id:2, text:'Update stakeholders on sprint progress', priority:'medium', done:true, ts:Date.now()-7200000 },
      { id:3, text:'Read chapter 3 of "Deep Work" by Cal Newport', priority:'low', done:false, ts:Date.now()-1800000 },
      { id:4, text:'Schedule weekly 1:1 with manager', priority:'medium', done:false, ts:Date.now()-900000 },
    ];
    save();
  }
  function updateClock() {
    const now = new Date();
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('dateBadge').textContent = `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('timeBadge').textContent = `${h}:${m}`;
    const hour = now.getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const emoji = hour < 12 ? '☀️' : hour < 17 ? '⚡' : '🌙';
    document.getElementById('greetingLine').innerHTML = `${greet}<span> ${emoji}</span>`;
  }
  updateClock();
  setInterval(updateClock, 30000);
  function save() { localStorage.setItem('taskok-v2', JSON.stringify(tasks)); }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function formatTime(ts) {
    const d = new Date(ts);
    const h = d.getHours(); const m = String(d.getMinutes()).padStart(2,'0');
    return `${h % 12 || 12}:${m} ${h >= 12 ? 'PM' : 'AM'}`;
  }
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    tasks.unshift({ id:Date.now(), text, priority:selectedPriority, done:false, ts:Date.now() });
    input.value = ''; save(); render();
    showToast('✓ Task added'); input.focus();
  }
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id); if (!t) return;
    t.done = !t.done; save(); render();
    showToast(t.done ? '🎉 Task completed!' : '↩ Task reopened');
  }
  function deleteTask(id) { tasks = tasks.filter(t => t.id !== id); save(); render(); showToast('🗑 Task removed'); }
  function clearDone() {
    const count = tasks.filter(t => t.done).length;
    if (!count) return;
    tasks = tasks.filter(t => !t.done); save(); render();
    showToast(`✓ Cleared ${count} completed task${count > 1 ? 's' : ''}`);
  }
  function getFiltered() {
    switch(filter) {
      case 'active': return tasks.filter(t => !t.done);
      case 'done': return tasks.filter(t => t.done);
      case 'high': return tasks.filter(t => t.priority === 'high');
      case 'medium': return tasks.filter(t => t.priority === 'medium');
      case 'low': return tasks.filter(t => t.priority === 'low');
      default: return tasks;
    }
  }
  function esc(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function render() {
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct = total ? Math.round((done/total)*100) : 0;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('progressPct').textContent = pct + '%';
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressMsg').textContent = total === 0 ? 'No tasks yet' : pct === 100 ? '🎉 All done!' : `${done} of ${total} tasks done`;
    document.getElementById('greetingSub').textContent = total === 0 ? 'Start by adding your first task below.' : pending === 0 ? 'Amazing! You\'ve completed all tasks today.' : `You have ${pending} task${pending > 1 ? 's' : ''} remaining today.`;
    const filtered = getFiltered();
    const list = document.getElementById('task-list');
    const empty = document.getElementById('emptyState');
    if (filtered.length === 0) { list.innerHTML = ''; empty.classList.add('show'); }
    else {
      empty.classList.remove('show');
      list.innerHTML = filtered.map(t => `
        <li class="task-item p-${t.priority} ${t.done ? 'completed' : ''}">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleTask(${t.id})"></div>
          <div class="task-body">
            <div class="task-name">${esc(t.text)}</div>
            <div class="task-meta">
              <span class="task-tag tag-${t.priority}">${t.priority}</span>
              <span class="task-time">${formatTime(t.ts)}</span>
            </div>
          </div>
          <button class="task-del" onclick="deleteTask(${t.id})">✕</button>
        </li>`).join('');
    }
  }
  document.querySelectorAll('.prio-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.prio-btn').forEach(b => b.className = 'prio-btn');
      btn.classList.add(`active-${btn.dataset.p}`);
      selectedPriority = btn.dataset.p;
    });
  });
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active'); filter = btn.dataset.f; render();
    });
  });
  document.getElementById('addBtn').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('clearDoneBtn').addEventListener('click', clearDone);
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
  render();
</script>
</body>
</html>
